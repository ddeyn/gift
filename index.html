<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Steal UR GIFT NIGG-</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --p5-red: #d31212;
            --p5-black: #000000;
            --p5-white: #ffffff;
            --p5-blue: #0099ff;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--p5-black);
            color: var(--p5-white);
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* GIF Background */
        .gif-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background-image: url('https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJpM2FzY2pka2U0NTVyNWN1aW91c3V5emszZzN5ZHo3MGhsYmJoZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/2Xflxzhs6AATQcRWQvK/giphy.gif');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
        }

        #chibi-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .container {
            width: 90%;
            max-width: 450px;
            position: relative;
            z-index: 10;
        }

        /* Classic Chat Container */
        .im-container {
            background: #111;
            border: 4px solid var(--p5-white);
            border-radius: 20px;
            height: 75vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(211, 18, 18, 0.7);
        }

        .im-header {
            background: var(--p5-red);
            padding: 12px;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            border-bottom: 3px solid white;
        }

        .im-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #1a1a1a;
        }

        /* Chat Bubbles */
        .msg-bubble {
            max-width: 85%;
            padding: 12px 15px;
            position: relative;
            font-weight: bold;
            font-size: 0.95rem;
            clip-path: polygon(0 0, 100% 2%, 98% 100%, 2% 98%);
            animation: pop 0.3s ease-out;
            color: black;
        }

        .msg-left {
            align-self: flex-start;
            background: var(--p5-white);
            border-left: 6px solid var(--p5-red);
        }

        .msg-sender {
            font-size: 0.7rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
            color: var(--p5-red);
            font-weight: 900;
        }

        @keyframes pop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* UI Cards */
        .p5-card {
            background: var(--p5-white);
            color: var(--p5-black);
            padding: 20px;
            transform: rotate(-0.5deg);
            box-shadow: 10px 10px 0px var(--p5-red), -3px -3px 0px var(--p5-black);
            border: 2px solid var(--p5-black);
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            font-style: italic;
            background: var(--p5-black);
            color: var(--p5-white);
            display: inline-block;
            padding: 4px 12px;
            transform: rotate(1deg) translateX(-5px);
            margin-bottom: 10px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--p5-black);
            color: var(--p5-white);
            border: none;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            clip-path: polygon(1% 0%, 100% 3%, 99% 100%, 0% 97%);
            text-align: left;
            padding-left: 25px;
            transition: 0.2s;
        }

        .btn:active { background: var(--p5-red); }
        .btn.unlocked { background: var(--p5-white); color: var(--p5-red); border: 2px solid var(--p5-red); }

        /* Media Box */
        .media-box {
            margin: 20px 0;
            border: 4px solid black;
            box-shadow: 8px 8px 0px var(--p5-red);
            background: #000;
            width: 100%;
        }
        .media-box img, .media-box video { 
            width: 100%; 
            display: block; 
            max-height: 500px;
            object-fit: contain;
        }

        /* Quiz UI */
        .option-btn {
            background: white;
            color: black;
            border: 2px solid black;
            padding: 10px;
            margin-bottom: 8px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: 0.2s;
        }
        .option-btn.selected { background: var(--p5-red); color: white; border-color: white; }

        .quiz-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid var(--p5-red);
            font-family: inherit;
            font-weight: 900;
            text-transform: uppercase;
            outline: none;
            background: #eee;
        }

        .code-reveal {
            background: var(--p5-red);
            color: white;
            padding: 3px 8px;
            font-weight: 900;
            font-size: 0.8rem;
            display: inline-block;
        }

        #trump-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mute Button */
        #mute-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--p5-red);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2000;
            font-weight: bold;
            box-shadow: 0 0 10px black;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="gif-bg"></div>
    <canvas id="chibi-canvas"></canvas>

    <!-- Audio Elements -->
    <audio id="audio-bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
    <audio id="audio-correct"><source src="correct.mp3" type="audio/mpeg"></audio>
    <audio id="audio-wrong"><source src="wrong.mp3" type="audio/mpeg"></audio>
    <audio id="audio-clear"><source src="stage_clear.mp3" type="audio/mpeg"></audio>
    <audio id="audio-code-ok"><source src="code_success.mp3" type="audio/mpeg"></audio>
    <audio id="audio-code-fail"><source src="code_fail.mp3" type="audio/mpeg"></audio>

    <!-- Mute Control -->
    <div id="mute-btn" onclick="toggleMute()">🔊</div>

    <!-- Trump Modal -->
    <div id="trump-modal" class="hidden" onclick="closeTrump()">
        <div style="background:var(--p5-red); padding:40px; text-align:center; border:5px solid white; transform:rotate(-2deg); box-shadow: 15px 15px 0 black;">
            <h2 style="font-size:3rem;">WRONG!</h2>
            <p style="margin:20px 0; font-weight: bold;">YOUR TRUMP WILL 🍇 YOU</p>
            <button class="btn" style="text-align:center; padding-left:0; background: black;">I UNDERSTAND</button>
        </div>
    </div>

    <div id="app-container" class="container">
        
        <!-- Main Menu -->
        <div id="main-menu" class="p5-card">
            <h1>GIFT ROYAL</h1>
            <p style="font-size: 0.8rem; font-weight: 900; margin-bottom: 15px;">STEAL YOUR GIFT</p>
            
            <div id="reveal-1" class="code-reveal hidden">KEY 1: 11---</div>
            <button class="btn" id="btn-messages" onclick="handleSectionClick('messages')">PHANTOM CALLS</button>
            
            <div id="reveal-2" class="code-reveal hidden">KEY 2: --03-</div>
            <button class="btn" id="btn-videos" onclick="handleSectionClick('videos')">MEMORY HEIST</button>
            
            <div id="reveal-3" class="code-reveal hidden">KEY 3: ----7</div>
            <button class="btn" id="btn-drawings" onclick="handleSectionClick('drawings')">GALLERY OF THIEVES</button>

            <div style="margin-top:15px; border-top: 2px solid black; padding-top:15px;">
                <input type="text" id="master-code-input" maxlength="5" placeholder="CODE" style="width:50%; padding:8px; font-weight: 900;">
                <button class="btn" style="display:inline-block; width:40%; padding-left:0; text-align:center; background:var(--p5-red); margin:0;" onclick="checkMasterCode()">GO</button>
            </div>
        </div>

        <!-- Hybrid Quiz Container -->
        <div id="quiz-container" class="p5-card hidden" style="background: black; color: white; border-color: white;">
            <div id="question-text" style="font-size:1rem; margin-bottom:15px; font-weight:900;">TRIAL...</div>
            
            <div id="quiz-content-area">
                <!-- Question input or options appear here -->
            </div>

            <button class="btn" style="background:var(--p5-red); text-align:center; padding-left:0; margin-top:20px;" onclick="submitAnswer()">EXECUTE</button>
            <button class="btn" style="background:white; color:black; text-align:center; padding-left:0;" onclick="goHome()">RETREAT</button>
        </div>

        <!-- Classic Chat Messages -->
        <div id="content-messages" class="im-container hidden">
            <div class="im-header">PHANTOM CHAT</div>
            <div class="im-body" id="chat-flow"></div>
            <button class="btn" onclick="goHome()" style="margin:10px; background:var(--p5-red); text-align:center; padding-left:0;">BACK TO MENU</button>
        </div>

        <!-- Gallery -->
        <div id="content-gallery" class="p5-card hidden">
            <h2 id="gallery-title" style="font-size:1.1rem; margin-bottom:15px;">GALLERY</h2>
            <div id="gallery-items" style="max-height: 60vh; overflow-y:auto;"></div>
            <button class="btn" onclick="goHome()" style="background:var(--p5-red); text-align:center; padding-left:0; margin-top:15px;">BACK</button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        // --- AUDIO ENGINE ---
        const playSound = (id) => {
            const el = document.getElementById(id);
            if(el) { el.currentTime = 0; el.play().catch(() => {}); }
        };

        function toggleMute() {
            const bgm = document.getElementById('audio-bgm');
            const btn = document.getElementById('mute-btn');
            if(bgm.muted) {
                bgm.muted = false; btn.innerText = "🔊";
            } else {
                bgm.muted = true; btn.innerText = "🔇";
            }
        }

        document.body.addEventListener('click', () => {
            const bgm = document.getElementById('audio-bgm');
            if(bgm.paused) bgm.play();
        }, { once: true });

        // --- DATA ---
        const quizBank = [
            { type: "choice", q: "Fata Morgana: Real name of 'The Maid'?", options: ["Giselle", "Maria", "Nellie", "Mell"], answer: "Giselle" },
            { type: "choice", q: "Persona 5: Morgana's Ultimate Persona?", options: ["Mercurius", "Zorro", "Diego", "Arsene"], answer: "Mercurius" },
            { type: "choice", q: "Danganronpa: Kyoko's father's name?", options: ["Jin", "Makoto", "Byakuya", "Junko"], answer: "Jin" },
            { type: "text", q: "Fata Morgana: Year of Door 4? (Numbers only)", answer: "1099" },
            { type: "choice", q: "Code Geass: Lelouch's natural eye color?", options: ["Violet", "Green", "Red", "Blue"], answer: "Violet" },
            { type: "choice", q: "Hollow Knight: Pale King's daughter?", options: ["Hornet", "Isma", "Dryya", "Ze'mer"], answer: "Hornet" },
            { type: "text", q: "Hollow Knight: Starting Masks? (Number)", answer: "5" },
            { type: "choice", q: "P5: Does Akechi have a Palace?", options: ["No", "Yes", "Only in Royal", "Maybe"], answer: "No" },
            { type: "choice", q: "Code Geass: Lelouch's organization?", options: ["Black Knights", "Zeroes", "Order of Geass", "Britannia"], answer: "Black Knights" },
            { type: "text", q: "Danganronpa: Kyoko's seat number?", answer: "6" },
            { type: "choice", q: "Fata Morgana: Michel's biological sex?", options: ["Female", "Male", "Unknown", "Both"], answer: "Female" },
            { type: "choice", q: "P5: Is Morgana a cat in the real world?", options: ["Yes", "No"], answer: "Yes" },
            { type: "choice", q: "Code Geass: Marianne's Knightmare?", options: ["Ganimede", "Gawain", "Lancelot", "Shinkiro"], answer: "Ganimede" },
            { type: "choice", q: "Hollow Knight: Who is 'God of Gods'?", options: ["Void Given Focus", "Radiance", "Pale King", "Grimm"], answer: "Void Given Focus" },
            { type: "choice", q: "Code Geass: Favorite strategy game?", options: ["Chess", "Poker", "Shogi", "Go"], answer: "Chess" }
        ];

        const chatMessages = [
            { s: "Morgana", m: "Joker! The target is wide open. This heist is personal." },
            { s: "Ryuji", m: "For real?! Let's go and kick some palace butt!" },
            { s: "Ann", m: "Everything is ready on my side. Don't be late!" }
        ];

        let unlocked = { messages: false, videos: false, drawings: false };
        let currentSection = '';
        let currentIdx = 0;
        let selectedChoice = null;

        // --- LOGIC ---
        function handleSectionClick(s) {
            if(unlocked[s]) {
                if(s === 'messages') startChat();
                else showGallery(s);
            } else {
                startQuiz(s);
            }
        }

        function startQuiz(s) {
            currentSection = s; 
            currentIdx = 0;
            hideAll();
            document.getElementById('quiz-container').classList.remove('hidden');
            renderQ();
        }

        function renderQ() {
            const q = quizBank[currentIdx];
            document.getElementById('question-text').innerText = `${currentIdx+1}/15: ${q.q}`;
            const area = document.getElementById('quiz-content-area');
            area.innerHTML = '';
            selectedChoice = null;

            if(q.type === "choice") {
                q.options.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'option-btn';
                    b.innerText = opt;
                    b.onclick = () => {
                        document.querySelectorAll('.option-btn').forEach(el => el.classList.remove('selected'));
                        b.classList.add('selected');
                        selectedChoice = opt;
                    };
                    area.appendChild(b);
                });
            } else {
                const input = document.createElement('input');
                input.type = "text";
                input.id = "quiz-text-input";
                input.className = "quiz-input";
                input.placeholder = "ANSWER HERE";
                area.appendChild(input);
                input.focus();
                input.onkeypress = (e) => { if(e.key === 'Enter') submitAnswer(); };
            }
        }

        function submitAnswer() {
            const q = quizBank[currentIdx];
            let ans = "";
            if(q.type === "choice") ans = selectedChoice;
            else ans = document.getElementById('quiz-text-input').value.trim();

            if(!ans) return;

            if(ans.toString().toLowerCase() === q.answer.toLowerCase()) {
                playSound('audio-correct');
                currentIdx++;
                if(currentIdx >= 15) {
                    playSound('audio-clear');
                    unlocked[currentSection] = true;
                    goHome();
                } else renderQ();
            } else {
                playSound('audio-wrong');
                document.getElementById('trump-modal').classList.remove('hidden');
            }
        }

        function startChat() {
            hideAll();
            document.getElementById('content-messages').classList.remove('hidden');
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = '';
            chatMessages.forEach((msg, i) => {
                setTimeout(() => {
                    flow.innerHTML += `
                        <div class="msg-bubble msg-left">
                            <span class="msg-sender">${msg.s}</span>
                            ${msg.m}
                        </div>
                    `;
                    flow.scrollTop = flow.scrollHeight;
                }, i * 700);
            });
        }

        function showGallery(s) {
            hideAll();
            const gall = document.getElementById('content-gallery');
            const items = document.getElementById('gallery-items');
            const title = document.getElementById('gallery-title');
            gall.classList.remove('hidden');
            items.innerHTML = '';
            
            if(s === 'videos') {
                title.innerText = "RESTORED MEMORIES";
                // Fixed media paths
                items.innerHTML = `
                    <div class="media-box">
                        <video controls poster="photo1.jpg">
                            <source src="video1.mp4" type="video/mp4">
                            Your browser does not support videos.
                        </video>
                    </div>
                    <div class="media-box"><img src="photo1.jpg" onerror="this.src='https://via.placeholder.com/400x300?text=Photo1.jpg+Not+Found'"></div>
                `;
            } else {
                title.innerText = "GALLERY OF THIEVES";
                items.innerHTML = `
                    <div class="media-box"><img src="drawing1.jpg" onerror="this.src='https://via.placeholder.com/400x500?text=Drawing1.jpg+Not+Found'"></div>
                    <div class="media-box"><img src="drawing2.jpg" onerror="this.src='https://via.placeholder.com/400x500?text=Drawing2.jpg+Not+Found'"></div>
                `;
            }
        }

        function goHome() {
            hideAll();
            document.getElementById('main-menu').classList.remove('hidden');
            syncUI();
        }

        function hideAll() {
            ['main-menu', 'quiz-container', 'content-messages', 'content-gallery'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
        }

        function syncUI() {
            if(unlocked.messages) { document.getElementById('btn-messages').classList.add('unlocked'); document.getElementById('reveal-1').classList.remove('hidden'); }
            if(unlocked.videos) { document.getElementById('btn-videos').classList.add('unlocked'); document.getElementById('reveal-2').classList.remove('hidden'); }
            if(unlocked.drawings) { document.getElementById('btn-drawings').classList.add('unlocked'); document.getElementById('reveal-3').classList.remove('hidden'); }
        }

        function checkMasterCode() {
            if(document.getElementById('master-code-input').value === "11037") {
                playSound('audio-code-ok');
                unlocked = { messages: true, videos: true, drawings: true };
                goHome();
            } else {
                playSound('audio-code-fail');
            }
        }

        function closeTrump() { document.getElementById('trump-modal').classList.add('hidden'); }

        // --- PHYSICS ---
        window.onload = () => {
            const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
            const engine = Engine.create();
            const canvas = document.getElementById('chibi-canvas');
            const render = Render.create({
                canvas: canvas, engine: engine,
                options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
            });
            const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight+50, window.innerWidth, 100, { isStatic: true });
            Composite.add(engine.world, ground);
            const spawn = () => {
                const c = Bodies.circle(Math.random()*window.innerWidth, -50, 20, {
                    restitution: 0.5,
                    render: { sprite: { texture: 'chibi.png', xScale: 0.12, yScale: 0.12 } }
                });
                Composite.add(engine.world, c);
            };
            for(let i=0; i<7; i++) spawn();
            Events.on(engine, 'afterUpdate', () => {
                engine.world.bodies.forEach(b => {
                    if(b.position.y > window.innerHeight + 50) {
                        Matter.Body.setPosition(b, { x: Math.random()*window.innerWidth, y: -50 });
                        Matter.Body.setVelocity(b, { x: 0, y: 0 });
                    }
                });
            });
            Render.run(render);
            Runner.run(Runner.create(), engine);
        };
    </script>
</body>
</html>
