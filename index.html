<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Take Your GIFT - Royal Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --p5-red: #d31212;
            --p5-black: #000000;
            --p5-white: #ffffff;
            --p5-blue: #0099ff;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--p5-black);
            color: var(--p5-white);
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gif-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background-image: url('https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJpM2FzY2pka2U0NTVyNWN1aW91c3V5emszZzN5ZHo3MGhsYmJoZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/2Xflxzhs6AATQcRWQvK/giphy.gif');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
        }

        #chibi-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .container {
            width: 90%;
            max-width: 450px;
            position: relative;
            z-index: 10;
        }

        .im-container {
            background: #111;
            border: 4px solid var(--p5-white);
            border-radius: 20px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(211, 18, 18, 0.7);
        }

        .im-header {
            background: var(--p5-red);
            padding: 12px;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            border-bottom: 3px solid white;
        }

        .im-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #1a1a1a;
        }

        .msg-bubble {
            max-width: 85%;
            padding: 12px 15px;
            position: relative;
            font-weight: bold;
            font-size: 0.95rem;
            clip-path: polygon(0 0, 100% 2%, 98% 100%, 2% 98%);
            animation: pop 0.3s ease-out;
            color: black;
            unicode-bidi: plaintext;
            text-align: left;
            white-space: pre-wrap; /* عشان يحترم السطور الجديدة \n */
        }

        .msg-left {
            align-self: flex-start;
            background: var(--p5-white);
            border-left: 6px solid var(--p5-red);
        }

        .msg-sender {
            font-size: 0.7rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
            color: var(--p5-red);
            font-weight: 900;
        }

        @keyframes pop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .p5-card {
            background: var(--p5-white);
            color: var(--p5-black);
            padding: 20px;
            transform: rotate(-0.5deg);
            box-shadow: 10px 10px 0px var(--p5-red), -3px -3px 0px var(--p5-black);
            border: 2px solid var(--p5-black);
            max-height: 85vh;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            font-style: italic;
            background: var(--p5-black);
            color: var(--p5-white);
            display: inline-block;
            padding: 4px 12px;
            transform: rotate(1deg) translateX(-5px);
            margin-bottom: 10px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--p5-black);
            color: var(--p5-white);
            border: none;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            clip-path: polygon(1% 0%, 100% 3%, 99% 100%, 0% 97%);
            text-align: left;
            padding-left: 25px;
            transition: 0.2s;
        }

        .btn:active { background: var(--p5-red); }
        .btn.unlocked { background: var(--p5-white); color: var(--p5-red); border: 2px solid var(--p5-red); }

        .media-box {
            margin: 20px 0;
            border: 4px solid black;
            box-shadow: 8px 8px 0px var(--p5-red);
            background: #000;
            width: 100%;
        }

        .media-box img { 
            display: block;
            width: 100%; 
            height: auto; 
        }

        .media-box iframe {
            width: 100%;
            aspect-ratio: 16 / 9; 
            border: none;
            display: block;
        }

        .option-btn {
            background: white;
            color: black;
            border: 2px solid black;
            padding: 10px;
            margin-bottom: 8px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: 0.2s;
        }
        .option-btn.selected { background: var(--p5-red); color: white; border-color: white; }

        .quiz-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid var(--p5-red);
            font-family: inherit;
            font-weight: 900;
            text-transform: uppercase;
            outline: none;
            background: #eee;
        }

        .code-reveal {
            background: var(--p5-red);
            color: white;
            padding: 3px 8px;
            font-weight: 900;
            font-size: 0.8rem;
            display: inline-block;
        }

        #trump-modal, #geet-modal, #hint-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mute-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--p5-red);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2000;
            font-weight: bold;
            box-shadow: 0 0 10px black;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="gif-bg"></div>
    <canvas id="chibi-canvas"></canvas>

    <audio id="audio-bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
    <audio id="audio-correct"><source src="correct.mp3" type="audio/mpeg"></audio>
    <audio id="audio-wrong"><source src="wrong.mp3" type="audio/mpeg"></audio>
    <audio id="audio-clear"><source src="stage_clear.mp3" type="audio/mpeg"></audio>
    <audio id="audio-code-ok"><source src="code_success.mp3" type="audio/mpeg"></audio>
    <audio id="audio-code-fail"><source src="code_fail.mp3" type="audio/mpeg"></audio>

    <div id="mute-btn" onclick="toggleMute()">🔊</div>

    <div id="trump-modal" class="hidden" onclick="closeTrump()">
        <div style="background:var(--p5-red); padding:40px; text-align:center; border:5px solid white; transform:rotate(-2deg); box-shadow: 15px 15px 0 black;">
            <h2 style="font-size:3rem;">WRONG!</h2>
            <p style="margin:20px 0; font-weight: bold;">NETANYAHU WILL 🍇 YOU</p>
            <button class="btn" style="text-align:center; padding-left:0; background: black;">SORRY >: </button>
        </div>
    </div>

    <div id="hint-modal" class="hidden" onclick="this.classList.add('hidden')">
        <div style="background:var(--p5-blue); padding:20px; text-align:center; border:5px solid white; box-shadow: 10px 10px 0 black; max-width: 90%;">
            <h3 style="margin-bottom:10px;">HINT</h3>
            <p id="hint-text" style="font-weight: bold; margin-bottom:15px; color: white;"></p>
            <img src="hint.jpg" onerror="this.src='https://media.discordapp.net/attachments/1479966326285013205/1483200649268166809/3bb647b3ef23057ac1889415c02cdb69.jpg?ex=69b9b9bf&is=69b8683f&hm=babde26d1118a5b72c326fb78e54fa7d192c364d579f741ef184d6ecd52bd394&=&format=webp&width=505&height=430'" style="width: 100%; border: 2px solid black;">
            <p style="font-size:0.7rem; margin-top:10px; color: #ccf;">(Tap anywhere to close)</p>
        </div>
    </div>

    <div id="geet-modal" class="hidden" onclick="this.classList.add('hidden')">
        <div style="background:var(--p5-red); padding:15px; text-align:center; border:5px solid white; box-shadow: 15px 15px 0 black; max-width: 90%;">
            <img src="geet.jpg" onerror="this.src='https://media.discordapp.net/attachments/1479966326285013205/1483200165820109044/63e434bf5097d519989502b6bfd462fa.jpg?ex=69b9b94c&is=69b867cc&hm=f5a92a9c14ef4d269add9eb8a19245fb36a4cbac7cdc48f4c2a0e65c31e4424a&=&format=webp&width=920&height=920'" style="max-width: 100%; border: 2px solid black; display: block;">
            <p style="margin-top:15px; font-weight: bold; font-size: 1.5rem; color: white;">GOOD JOB NIGGA!</p>
            <p style="font-size: 0.8rem; color: #ffcccc;">(Tap to close)</p>
        </div>
    </div>

    <div id="app-container" class="container">
        
        <div id="main-menu" class="p5-card">
            <h1>GIFT ROYAL</h1>
            <p style="font-size: 0.8rem; font-weight: 900; margin-bottom: 15px;">STEAL YOUR GIFT</p>
            
            <div id="reveal-1" class="code-reveal hidden">KEY 1: 11---</div>
            <button class="btn" id="btn-messages" onclick="handleSectionClick('messages')">PHANTOM CALLS</button>
            
            <div id="reveal-2" class="code-reveal hidden">KEY 2: --03-</div>
            <button class="btn" id="btn-videos" onclick="handleSectionClick('videos')">MEMORY HEIST</button>
            
            <div id="reveal-3" class="code-reveal hidden">KEY 3: ----7</div>
            <button class="btn" id="btn-drawings" onclick="handleSectionClick('drawings')">GALLERY OF THIEVES</button>

            <div style="margin-top:15px; border-top: 2px solid black; padding-top:15px;">
                <input type="text" id="master-code-input" maxlength="5" placeholder="ENTER 5-DIGIT CODE" style="width:65%; padding:8px; font-weight: 900;">
                <button class="btn" style="display:inline-block; width:30%; padding-left:0; text-align:center; background:var(--p5-red); margin:0;" onclick="checkMasterCode()">GO</button>
            </div>
        </div>

        <div id="quiz-container" class="p5-card hidden" style="background: black; color: white; border-color: white;">
            <div id="question-text" style="font-size:1rem; margin-bottom:15px; font-weight:900;">TRIAL...</div>
            <div id="quiz-content-area"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background:var(--p5-red); text-align:center; padding-left:0; margin-top:20px; flex: 2;" onclick="submitAnswer()">EXECUTE</button>
                <button class="btn" style="background:var(--p5-blue); text-align:center; padding-left:0; margin-top:20px; flex: 1;" onclick="showHint()">HINT</button>
            </div>
            <button class="btn" style="background:white; color:black; text-align:center; padding-left:0;" onclick="goHome()">RETREAT</button>
        </div>

        <div id="content-messages" class="im-container hidden">
            <div class="im-header">PHANTOM CHAT ( رسايل تهنئى انك قربت من موتك سنة)</div>
            <div class="im-body" id="chat-flow"></div>
            <button class="btn" onclick="goHome()" style="margin:10px; background:var(--p5-red); text-align:center; padding-left:0;">BACK TO MENU</button>
        </div>

        <div id="content-gallery" class="p5-card hidden">
            <h2 id="gallery-title" style="font-size:1.1rem; margin-bottom:15px;">GALLERY</h2>
            <div id="gallery-items" style="max-height: 55vh; overflow-y:auto;"></div>
            <button class="btn" onclick="goHome()" style="background:var(--p5-red); text-align:center; padding-left:0; margin-top:15px;">BACK</button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const playSound = (id) => {
            const el = document.getElementById(id);
            if(el) { el.currentTime = 0; el.play().catch(() => {}); }
        };

        const startBGM = () => {
            const bgm = document.getElementById('audio-bgm');
            if (bgm.paused) bgm.play().catch(() => {});
        };

        function toggleMute() {
            const bgm = document.getElementById('audio-bgm');
            const btn = document.getElementById('mute-btn');
            if(bgm.muted) { bgm.muted = false; btn.innerText = "🔊"; } 
            else { bgm.muted = true; btn.innerText = "🔇"; }
        }

        const banks = {
            messages: [
                { type: "choice", q: "P5: Who is the first party member you meet?", options: ["Ryuji", "Ann", "Morgana", "Yusuke"], answer: "Ryuji", hint: "A loud-mouthed student with dyed blonde hair." },
                { type: "choice", q: "P5: Joker's starting Persona?", options: ["Arsene", "Zorro", "Captain Kidd", "Carmen"], answer: "Arsene", hint: "A gentleman thief named after a French character." },
                { type: "text", q: "Fata Morgana: Real name of 'The White-Haired Girl'?", answer: "Giselle", hint: "Her name starts with the letter G." },
                { type: "choice", q: "Danganronpa: Ultimate Lucky Student (DR1)?", options: ["Makoto", "Nagito", "Hajime", "Kyoko"], answer: "Makoto", hint: "The protagonist of the first game." },
                { type: "choice", q: "Code Geass: Lelouch's Geass power location?", options: ["Left Eye", "Right Eye", "Hand", "Chest"], answer: "Left Eye", hint: "The eye he usually hides with his hair." },
                { type: "text", q: "Hollow Knight: The creator of the kingdom?", answer: "Pale King", hint: "The monarch of Hallownest." },
                { type: "choice", q: "P5: Morgana's catchphrase?", options: ["Looking cool Joker", "Go to sleep", "Steal your heart", "Meow"], answer: "Looking cool Joker", hint: "Something he says when the hero performs well." },
                { type: "choice", q: "Fata Morgana: The Maid's true role?", options: ["Observer", "Killer", "Lover", "Mother"], answer: "Observer", hint: "She watches the tragedies of the mansion." },
                { type: "choice", q: "Danganronpa: Who is the mascot?", options: ["Monokuma", "Monomi", "Junko", "Kuma"], answer: "Monokuma", hint: "A half-white, half-black bear." },
                { type: "text", q: "Code Geass: Lelouch's alias?(Numbers 0 ,1 , 2,etc)", answer: "0", hint: "A number that represents nothingness." },
                { type: "choice", q: "Hollow Knight: The main weapon?", options: ["Nail", "Sword", "Spear", "Axe"], answer: "Nail", hint: "A simple, blunt-looking sharp tool." },
                { type: "choice", q: "P5: Ann Takamaki's Persona?", options: ["Carmen", "Johanna", "Milady", "Necronomicon"], answer: "Carmen", hint: "A woman in a red dress with roses." },
                { type: "choice", q: "Fata Morgana: The house's type?", options: ["Mansion", "Castle", "Cottage", "Apartment"], answer: "Mansion", hint: "A large, cursed house." },
                { type: "choice", q: "Danganronpa: Kyoko Kirigiri's talent?", options: ["Detective", "Nurse", "Gamer", "Writer"], answer: "Detective", hint: "She excels at solving mysteries." },
                { type: "text", q: "Code Geass: CC's favorite food?", answer: "Pizza", hint: "A popular Italian dish she often eats." }
            ],
            videos: [
                { type: "choice", q: "P5: Sae Niijima's Palace theme?", options: ["Casino", "Bank", "Museum", "Space"], answer: "Casino", hint: "A place of gambling and bright lights." },
                { type: "choice", q: "Fata Morgana: Michel's brother's name?", options: ["Georges", "Didier", "Aimee", "Nellie"], answer: "Georges", hint: "Starts with G, similar to the white-haired girl." },
                { type: "text", q: "Danganronpa: First victim's name (DR1)?", answer: "Sayaka Maizono", hint: "The Ultimate Pop Sensation." },
                { type: "choice", q: "Code Geass: Lelouch's sister?", options: ["Nunnally", "Euphemia", "Cornelia", "Shirley"], answer: "Nunnally", hint: "She is blind and uses a wheelchair." },
                { type: "choice", q: "Hollow Knight: Hornet's weapon?", options: ["Needle", "Nail", "Web", "Spike"], answer: "Needle", hint: "A tool used for sewing." },
                { type: "text", q: "P5: Shido's representative animal?", answer: "Lion", hint: "The king of the jungle." },
                { type: "choice", q: "Fata Morgana: Michel's true identity?", options: ["Intersex", "Male", "Female", "Unknown"], answer: "Intersex", hint: "A condition involving both biological traits." },
                { type: "choice", q: "Danganronpa: Mastermind identity?", options: ["Junko Enoshima", "Mukuro", "Monokuma", "Naegi"], answer: "Junko Enoshima", hint: "The Ultimate Fashionista who loves despair." },
                { type: "choice", q: "Code Geass: The Knightmare frame of Suzaku?", options: ["Lancelot", "Gawain", "Guren", "Mordred"], answer: "Lancelot", hint: "Named after a famous Knight of the Round Table." },
                { type: "text", q: "Hollow Knight: The final boss in Pantheon 5?", answer: "Absolute Radiance", hint: "The true form of the moth god." },
                { type: "choice", q: "P5: Futaba's codename?", options: ["Oracle", "Navi", "Alibaba", "Queen"], answer: "Oracle", hint: "A person who provides divine wisdom or navigation." },
                { type: "choice", q: "Fata Morgana: Door 1 Year?", options: ["1603", "1099", "1860", "1950"], answer: "1603", hint: "The beginning of the 17th century." },
                { type: "choice", q: "Danganronpa: Who killed Chihiro?", options: ["Mondo", "Leon", "Celeste", "Sakura"], answer: "Mondo", hint: "The leader of a biker gang." },
                { type: "choice", q: "Code Geass: Suzaku's father?", options: ["Genbu Kururugi", "Lelouch", "Charles", "V.V."], answer: "Genbu Kururugi", hint: "The former Prime Minister of Japan." },
                { type: "text", q: "Hollow Knight: The shopkeeper's name?", answer: "Sly", hint: "He is small but carries a Greatslash." }
            ],
            drawings: [
                { type: "choice", q: "P5: Final boss of the original game?", options: ["Yaldabaoth", "Maruki", "Shido", "Akechi"], answer: "Yaldabaoth", hint: "The God of Control." },
                { type: "choice", q: "Fata Morgana: Jacopo's lover in door 3?", options: ["Maria", "Nellie", "Giselle", "Morgana"], answer: "Maria", hint: "A very common name in that era." },
                { type: "text", q: "Danganronpa: What did Mondo turn into?", answer: "Butter", hint: "Something you spread on bread." },
                { type: "choice", q: "Code Geass: Who killed Euphemia?", options: ["Lelouch", "Suzaku", "Jeremiah", "Kallen"], answer: "Lelouch", hint: "Her brother, out of tragic necessity." },
                { type: "choice", q: "Hollow Knight: Where do you find the Abyss?", options: ["Ancient Basin", "Deepnest", "City of Tears", "Crystal Peak"], answer: "Ancient Basin", hint: "The deepest area of the map." },
                { type: "text", q: "P5: Maruki's Persona (Royal)?", answer: "Adam Kadmon", hint: "The ultimate evolution of Azathoth." },
                { type: "choice", q: "Fata Morgana: The Lord of the House?", options: ["Michel", "Jacopo", "Mell", "Georges"], answer: "Michel", hint: "The white-haired protagonist." },
                { type: "choice", q: "Danganronpa: Celeste's real name?", options: ["Taeko Yasuhiro", "Kirigiri", "Asahina", "Mikan"], answer: "Taeko Yasuhiro", hint: "A very plain Japanese name." },
                { type: "choice", q: "Code Geass: Lelouch's mother?", options: ["Marianne", "C.C.", "V.V.", "Euphemia"], answer: "Marianne", hint: "She was known as 'The Flash'." },
                { type: "text", q: "Hollow Knight: The number of Grubs?", answer: "46", hint: "Less than 50, more than 40." },
                { type: "choice", q: "P5: Makoto Niijima's Persona?", options: ["Johanna", "Agnes", "Anat", "Cybelle"], answer: "Johanna", hint: "It looks like a high-speed motorcycle." },
                { type: "choice", q: "Fata Morgana: Morgana's original form?", options: ["Witch", "Angel", "Spirit", "Demon"], answer: "Witch", hint: "She cursed the mansion inhabitants." },
                { type: "choice", q: "Danganronpa: Gonta's talent?", options: ["Entomologist", "Butler", "Boxer", "Artist"], answer: "Entomologist", hint: "He is obsessed with bugs." },
                { type: "choice", q: "Code Geass: Orange's real name?", options: ["Jeremiah Gottwald", "Viletta", "Lloyd", "Cécile"], answer: "Jeremiah Gottwald", hint: "The man with mechanical loyalty." },
                { type: "text", q: "Hollow Knight: The name of the white lady?", answer: "White Lady", hint: "Her name describes exactly what she is." }
            ]
        };

        let unlocked = { messages: false, videos: false, drawings: false };
        let currentSection = '';
        let currentIdx = 0;
        let selectedChoice = null;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function handleSectionClick(s) {
            startBGM();
            if(unlocked[s]) {
                openContent(s);
            } else { startQuiz(s); }
        }

        function openContent(s) {
            if(s === 'messages') startChat();
            else showGallery(s);
        }

        function startQuiz(s) {
            currentSection = s; 
            currentIdx = 0;
            hideAll();
            document.getElementById('quiz-container').classList.remove('hidden');
            renderQ();
        }

        function renderQ() {
            const q = banks[currentSection][currentIdx];
            document.getElementById('question-text').innerText = `STEP ${currentIdx+1}/15: ${q.q}`;
            const area = document.getElementById('quiz-content-area');
            area.innerHTML = '';
            selectedChoice = null;

            if(q.type === "choice") {
                const shuffledOptions = shuffleArray([...q.options]);
                shuffledOptions.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'option-btn';
                    b.innerText = opt;
                    b.onclick = () => {
                        document.querySelectorAll('.option-btn').forEach(el => el.classList.remove('selected'));
                        b.classList.add('selected');
                        selectedChoice = opt;
                    };
                    area.appendChild(b);
                });
            } else {
                const input = document.createElement('input');
                input.type = "text";
                input.id = "quiz-text-input";
                input.className = "quiz-input";
                input.placeholder = "TYPE YOUR ANSWER";
                area.appendChild(input);
                input.focus();
                input.onkeypress = (e) => { if(e.key === 'Enter') submitAnswer(); };
            }
        }

        function showHint() {
            const q = banks[currentSection][currentIdx];
            document.getElementById('hint-text').innerText = q.hint;
            document.getElementById('hint-modal').classList.remove('hidden');
        }

        function submitAnswer() {
            const q = banks[currentSection][currentIdx];
            let ans = "";
            if(q.type === "choice") ans = selectedChoice;
            else ans = document.getElementById('quiz-text-input').value.trim();

            if(!ans) return;

            if(ans.toString().toLowerCase() === q.answer.toLowerCase()) {
                playSound('audio-correct');
                currentIdx++;
                if(currentIdx >= 15) {
                    playSound('audio-clear');

        function closeTrump() { document.getElementById('trump-modal').classList.add('hidden'); }

        window.onload = () => {
            const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
            const engine = Engine.create();
            const canvas = document.getElementById('chibi-canvas');
            const render = Render.create({
                canvas: canvas, engine: engine,
                options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
            });
            const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight+50, window.innerWidth, 100, { isStatic: true });
            Composite.add(engine.world, ground);
            
            const spawn = () => {
                const c = Bodies.circle(Math.random()*window.innerWidth, -50, 20, {
                    restitution: 0.5,
                    render: { sprite: { texture: 'chibi.png', xScale: 0.12, yScale: 0.12 } }
                });
                Composite.add(engine.world, c);
            };
            
            for(let i=0; i<7; i++) spawn();
            
            Events.on(engine, 'afterUpdate', () => {
                engine.world.bodies.forEach(b => {
                    if(b.position.y > window.innerHeight + 50) {
                        Matter.Body.setPosition(b, { x: Math.random()*window.innerWidth, y: -50 });
                        Matter.Body.setVelocity(b, { x: 0, y: 0 });
                    }
                });
            });
            Render.run(render);
            Runner.run(Runner.create(), engine);
        };
