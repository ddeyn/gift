<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Persona 5 Royal - Take Your Heart</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --p5-red: #d31212;
            --p5-black: #000000;
            --p5-white: #ffffff;
            --p5-blue: #0099ff;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--p5-black);
            color: var(--p5-white);
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gif-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background-image: url('https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJpM2FzY2pka2U0NTVyNWN1aW91c3V5emszZzN5ZHo3MGhsYmJoZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/2Xflxzhs6AATQcRWQvK/giphy.gif');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
        }

        #chibi-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .container {
            width: 90%;
            max-width: 450px;
            position: relative;
            z-index: 10;
        }

        .im-container {
            background: #111;
            border: 4px solid var(--p5-white);
            border-radius: 20px;
            height: 75vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(211, 18, 18, 0.7);
        }

        .im-header {
            background: var(--p5-red);
            padding: 12px;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            border-bottom: 3px solid white;
        }

        .im-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #1a1a1a;
        }

        .msg-bubble {
            max-width: 85%;
            padding: 12px 15px;
            position: relative;
            font-weight: bold;
            font-size: 0.95rem;
            clip-path: polygon(0 0, 100% 2%, 98% 100%, 2% 98%);
            animation: pop 0.3s ease-out;
            color: black;
        }

        .msg-left {
            align-self: flex-start;
            background: var(--p5-white);
            border-left: 6px solid var(--p5-red);
        }

        .msg-sender {
            font-size: 0.7rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
            color: var(--p5-red);
            font-weight: 900;
        }

        @keyframes pop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .p5-card {
            background: var(--p5-white);
            color: var(--p5-black);
            padding: 20px;
            transform: rotate(-0.5deg);
            box-shadow: 10px 10px 0px var(--p5-red), -3px -3px 0px var(--p5-black);
            border: 2px solid var(--p5-black);
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            font-style: italic;
            background: var(--p5-black);
            color: var(--p5-white);
            display: inline-block;
            padding: 4px 12px;
            transform: rotate(1deg) translateX(-5px);
            margin-bottom: 10px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--p5-black);
            color: var(--p5-white);
            border: none;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            clip-path: polygon(1% 0%, 100% 3%, 99% 100%, 0% 97%);
            text-align: left;
            padding-left: 25px;
            transition: 0.2s;
        }

        .btn:active { background: var(--p5-red); }
        .btn.unlocked { background: var(--p5-white); color: var(--p5-red); border: 2px solid var(--p5-red); }

        .media-box {
            margin: 20px 0;
            border: 4px solid black;
            box-shadow: 8px 8px 0px var(--p5-red);
            background: #000;
            width: 100%;
        }
        .media-box img, .media-box video { 
            width: 100%; 
            display: block; 
            max-height: 500px;
            object-fit: contain;
        }

        .option-btn {
            background: white;
            color: black;
            border: 2px solid black;
            padding: 10px;
            margin-bottom: 8px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: 0.2s;
        }
        .option-btn.selected { background: var(--p5-red); color: white; border-color: white; }

        .quiz-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid var(--p5-red);
            font-family: inherit;
            font-weight: 900;
            text-transform: uppercase;
            outline: none;
            background: #eee;
        }

        .code-reveal {
            background: var(--p5-red);
            color: white;
            padding: 3px 8px;
            font-weight: 900;
            font-size: 0.8rem;
            display: inline-block;
        }

        #trump-modal, #geet-modal, #hint-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mute-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--p5-red);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2000;
            font-weight: bold;
            box-shadow: 0 0 10px black;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="gif-bg"></div>
    <canvas id="chibi-canvas"></canvas>

    <!-- Audio elements -->
    <audio id="audio-bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
    <audio id="audio-correct"><source src="correct.mp3" type="audio/mpeg"></audio>
    <audio id="audio-wrong"><source src="wrong.mp3" type="audio/mpeg"></audio>
    <audio id="audio-clear"><source src="stage_clear.mp3" type="audio/mpeg"></audio>
    <audio id="audio-code-ok"><source src="code_success.mp3" type="audio/mpeg"></audio>
    <audio id="audio-code-fail"><source src="code_fail.mp3" type="audio/mpeg"></audio>

    <div id="mute-btn" onclick="toggleMute()">🔊</div>

    <!-- Trump Modal -->
    <div id="trump-modal" class="hidden" onclick="closeTrump()">
        <div style="background:var(--p5-red); padding:40px; text-align:center; border:5px solid white; transform:rotate(-2deg); box-shadow: 15px 15px 0 black;">
            <h2 style="font-size:3rem;">WRONG!</h2>
            <p style="margin:20px 0; font-weight: bold;">YOUR TRUMP WILL CRUSH YOU</p>
            <button class="btn" style="text-align:center; padding-left:0; background: black;">I UNDERSTAND</button>
        </div>
    </div>

    <!-- Hint Modal -->
    <div id="hint-modal" class="hidden" onclick="this.classList.add('hidden')">
        <div style="background:var(--p5-blue); padding:20px; text-align:center; border:5px solid white; box-shadow: 10px 10px 0 black; max-width: 90%;">
            <h3 style="margin-bottom:10px;">HINT</h3>
            <p id="hint-text" style="font-weight: bold; margin-bottom:15px; color: white;"></p>
            <img src="hint.jpg" onerror="this.src='https://via.placeholder.com/300x200?text=Hint.jpg+Not+Found'" style="width: 100%; border: 2px solid black;">
            <p style="font-size:0.7rem; margin-top:10px; color: #ccf;">(Tap anywhere to close)</p>
        </div>
    </div>

    <!-- Geet Success Modal -->
    <div id="geet-modal" class="hidden" onclick="this.classList.add('hidden')">
        <div style="background:var(--p5-red); padding:15px; text-align:center; border:5px solid white; box-shadow: 15px 15px 0 black; max-width: 90%;">
            <img src="geet.jpg" onerror="this.src='https://via.placeholder.com/400x400?text=Geet.jpg+Not+Found'" style="max-width: 100%; border: 2px solid black; display: block;">
            <p style="margin-top:15px; font-weight: bold; font-size: 1.5rem; color: white;">STAGE CLEARED!</p>
            <p style="font-size: 0.8rem; color: #ffcccc;">(Tap to close)</p>
        </div>
    </div>

    <div id="app-container" class="container">
        
        <div id="main-menu" class="p5-card">
            <h1>ROYAL</h1>
            <p style="font-size: 0.8rem; font-weight: 900; margin-bottom: 15px;">STEAL HER HEART</p>
            
            <div id="reveal-1" class="code-reveal hidden">KEY 1: 11---</div>
            <button class="btn" id="btn-messages" onclick="handleSectionClick('messages')">PHANTOM CALLS</button>
            
            <div id="reveal-2" class="code-reveal hidden">KEY 2: --03-</div>
            <button class="btn" id="btn-videos" onclick="handleSectionClick('videos')">MEMORY HEIST</button>
            
            <div id="reveal-3" class="code-reveal hidden">KEY 3: ----7</div>
            <button class="btn" id="btn-drawings" onclick="handleSectionClick('drawings')">GALLERY OF THIEVES</button>

            <div style="margin-top:15px; border-top: 2px solid black; padding-top:15px;">
                <input type="text" id="master-code-input" maxlength="5" placeholder="CODE" style="width:50%; padding:8px; font-weight: 900;">
                <button class="btn" style="display:inline-block; width:40%; padding-left:0; text-align:center; background:var(--p5-red); margin:0;" onclick="checkMasterCode()">GO</button>
            </div>
        </div>

        <div id="quiz-container" class="p5-card hidden" style="background: black; color: white; border-color: white;">
            <div id="question-text" style="font-size:1rem; margin-bottom:15px; font-weight:900;">TRIAL...</div>
            
            <div id="quiz-content-area"></div>

            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background:var(--p5-red); text-align:center; padding-left:0; margin-top:20px; flex: 2;" onclick="submitAnswer()">EXECUTE</button>
                <button class="btn" style="background:var(--p5-blue); text-align:center; padding-left:0; margin-top:20px; flex: 1;" onclick="showHint()">HINT</button>
            </div>
            <button class="btn" style="background:white; color:black; text-align:center; padding-left:0;" onclick="goHome()">RETREAT</button>
        </div>

        <div id="content-messages" class="im-container hidden">
            <div class="im-header">PHANTOM CHAT</div>
            <div class="im-body" id="chat-flow"></div>
            <button class="btn" onclick="goHome()" style="margin:10px; background:var(--p5-red); text-align:center; padding-left:0;">BACK TO MENU</button>
        </div>

        <div id="content-gallery" class="p5-card hidden">
            <h2 id="gallery-title" style="font-size:1.1rem; margin-bottom:15px;">GALLERY</h2>
            <div id="gallery-items" style="max-height: 60vh; overflow-y:auto;"></div>
            <button class="btn" onclick="goHome()" style="background:var(--p5-red); text-align:center; padding-left:0; margin-top:15px;">BACK</button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        // --- AUDIO HELPERS ---
        const playSound = (id) => {
            const el = document.getElementById(id);
            if(el) { el.currentTime = 0; el.play().catch(() => {}); }
        };

        const startBGM = () => {
            const bgm = document.getElementById('audio-bgm');
            bgm.play().catch(() => {
                // If autoplay blocked, wait for first click
                window.addEventListener('click', () => bgm.play(), { once: true });
                window.addEventListener('touchstart', () => bgm.play(), { once: true });
            });
        };

        function toggleMute() {
            const bgm = document.getElementById('audio-bgm');
            const btn = document.getElementById('mute-btn');
            if(bgm.muted) { bgm.muted = false; btn.innerText = "🔊"; } 
            else { bgm.muted = true; btn.innerText = "🔇"; }
        }

        // --- QUIZ DATA (All numeric answers for text types) ---
        const banks = {
            messages: [
                { type: "choice", q: "P5: Who is the first party member you meet?", options: ["Ryuji", "Ann", "Morgana", "Yusuke"], answer: "Ryuji", hint: "A loud-mouthed student with dyed blonde hair." },
                { type: "text", q: "Fata Morgana: What door number leads to Mell's era?", answer: "1", hint: "The very first door." },
                { type: "choice", q: "Joker's starting Persona?", options: ["Arsene", "Zorro", "Captain Kidd"], answer: "Arsene", hint: "Gentleman thief." },
                { type: "text", q: "Danganronpa: What is the code hidden in Leon's death message?", answer: "11037", hint: "Look at the letters upside down." },
                { type: "choice", q: "Code Geass: Location of Lelouch's Geass?", options: ["Left Eye", "Right Eye"], answer: "Left Eye", hint: "The hidden eye." },
                { type: "text", q: "Hollow Knight: How many masks does the Knight start with?", answer: "5", hint: "A handful of health." },
                { type: "choice", q: "Morgana's catchphrase?", options: ["Looking cool Joker", "Go to sleep"], answer: "Looking cool Joker", hint: "Praise for the hero." },
                { type: "text", q: "Persona 5: In what year did the game originally release?", answer: "2016", hint: "Middle of the last decade." },
                { type: "choice", q: "Danganronpa Mascot?", options: ["Monokuma", "Monomi"], answer: "Monokuma", hint: "Black and white bear." },
                { type: "text", q: "Code Geass: How many seasons are in the main series?", answer: "2", hint: "R1 and R2." },
                { type: "choice", q: "Hollow Knight Weapon?", options: ["Nail", "Needle"], answer: "Nail", hint: "Standard tool." },
                { type: "text", q: "Fata Morgana: How many doors are in the mansion?", answer: "4", hint: "One for each main memory." },
                { type: "choice", q: "Kyoko Kirigiri's talent?", options: ["Detective", "Nurse"], answer: "Detective", hint: "Mystery solver." },
                { type: "text", q: "P5: How many Phantom Thieves members (including Royal)?", answer: "10", hint: "Double digits." },
                { type: "text", q: "What is the answer to everything?", answer: "42", hint: "Hitchhiker's guide." }
            ],
            videos: [
                { type: "choice", q: "Sae Niijima's Palace?", options: ["Casino", "Bank"], answer: "Casino", hint: "Gambling." },
                { type: "text", q: "Fata Morgana: Door 1 Year?", answer: "1603", hint: "Start of 17th century." },
                { type: "choice", q: "Hornet's weapon?", options: ["Needle", "Nail"], answer: "Needle", hint: "Sewing tool." },
                { type: "text", q: "Danganronpa: How many students are trapped at the start?", answer: "15", hint: "A dozen plus three." },
                { type: "choice", q: "Suzaku's Knightmare?", options: ["Lancelot", "Guren"], answer: "Lancelot", hint: "Arthurian knight." },
                { type: "text", q: "P5 Royal: What month does the 3rd semester start?", answer: "1", hint: "January." },
                { type: "choice", q: "Futaba's codename?", options: ["Oracle", "Queen"], answer: "Oracle", hint: "Navigator." },
                { type: "text", q: "Hollow Knight: Total number of Charms?", answer: "40", hint: "Round number." },
                { type: "choice", q: "Mastermind identity?", options: ["Junko Enoshima", "Mukuro"], answer: "Junko Enoshima", hint: "Fashionista." },
                { type: "text", q: "Code Geass: What year did the Holy Britannian Empire invade Japan?", answer: "2010", hint: "The year the world changed." },
                { type: "choice", q: "Suzaku's father's name?", options: ["Genbu", "Lelouch"], answer: "Genbu", hint: "Prime Minister." },
                { type: "text", q: "Fata Morgana: Door 2 Year?", answer: "1707", hint: "Early 18th century." },
                { type: "choice", q: "Who killed Chihiro?", options: ["Mondo", "Leon"], answer: "Mondo", hint: "Biker gang." },
                { type: "text", q: "P5: Max level for a Persona?", answer: "99", hint: "Almost 100." },
                { type: "text", q: "How many hours in a day?", answer: "24", hint: "Standard time." }
            ],
            drawings: [
                { type: "choice", q: "Original Final Boss?", options: ["Yaldabaoth", "Maruki"], answer: "Yaldabaoth", hint: "God of Control." },
                { type: "text", q: "Fata Morgana: Door 3 Year?", answer: "1860", hint: "Industrial era." },
                { type: "choice", q: "Celeste's talent?", options: ["Gambler", "Artist"], answer: "Gambler", hint: "Lies and bets." },
                { type: "text", q: "Code Geass: How many Knights of Round are there?", answer: "12", hint: "A full dozen." },
                { type: "choice", q: "Where is the Abyss?", options: ["Ancient Basin", "Deepnest"], answer: "Ancient Basin", hint: "The bottom." },
                { type: "text", q: "Hollow Knight: Number of Grubs to save?", answer: "46", hint: "Less than 50." },
                { type: "choice", q: "Makoto Niijima's Persona?", options: ["Johanna", "Agnes"], answer: "Johanna", hint: "Motorcycle." },
                { type: "text", q: "Danganronpa: Trial time limit usually starts at (min)?", answer: "60", hint: "One hour." },
                { type: "choice", q: "Orange's real name?", options: ["Jeremiah", "Lloyd"], answer: "Jeremiah", hint: "Loyalty." },
                { type: "text", q: "P5: Joker's seat row in class?", answer: "4", hint: "Count from front." },
                { type: "choice", q: "Gonta's talent?", options: ["Entomologist", "Butler"], answer: "Entomologist", hint: "Bugs." },
                { type: "text", q: "Fata Morgana: Door 4 Year?", answer: "1099", hint: "Medieval times." },
                { type: "choice", q: "White Lady's location?", options: ["Queen's Gardens", "Greenpath"], answer: "Queen's Gardens", hint: "Her home." },
                { type: "text", q: "How many legs does a spider have?", answer: "8", hint: "Arachnid." },
                { type: "text", q: "Double 7 is?", answer: "14", hint: "Math." }
            ]
        };

        let unlocked = { messages: false, videos: false, drawings: false };
        let currentSection = '';
        let currentIdx = 0;
        let selectedChoice = null;

        function handleSectionClick(s) {
            if(unlocked[s]) {
                if(s === 'messages') startChat();
                else showGallery(s);
            } else { startQuiz(s); }
        }

        function startQuiz(s) {
            currentSection = s; 
            currentIdx = 0;
            hideAll();
            document.getElementById('quiz-container').classList.remove('hidden');
            renderQ();
        }

        function renderQ() {
            const q = banks[currentSection][currentIdx];
            document.getElementById('question-text').innerText = `${currentIdx+1}/15: ${q.q}`;
            const area = document.getElementById('quiz-content-area');
            area.innerHTML = '';
            selectedChoice = null;

            if(q.type === "choice") {
                q.options.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'option-btn';
                    b.innerText = opt;
                    b.onclick = () => {
                        document.querySelectorAll('.option-btn').forEach(el => el.classList.remove('selected'));
                        b.classList.add('selected');
                        selectedChoice = opt;
                    };
                    area.appendChild(b);
                });
            } else {
                const input = document.createElement('input');
                input.type = "number"; // Changed to number for purely numeric answers
                input.id = "quiz-text-input";
                input.className = "quiz-input";
                input.placeholder = "ENTER NUMBER";
                area.appendChild(input);
                input.focus();
                input.onkeypress = (e) => { if(e.key === 'Enter') submitAnswer(); };
            }
        }

        function showHint() {
            const q = banks[currentSection][currentIdx];
            document.getElementById('hint-text').innerText = q.hint;
            document.getElementById('hint-modal').classList.remove('hidden');
        }

        function submitAnswer() {
            const q = banks[currentSection][currentIdx];
            let ans = "";
            if(q.type === "choice") ans = selectedChoice;
            else ans = document.getElementById('quiz-text-input').value.trim();

            if(!ans) return;

            if(ans.toString().toLowerCase() === q.answer.toLowerCase()) {
                playSound('audio-correct');
                currentIdx++;
                if(currentIdx >= 15) {
                    playSound('audio-clear');
                    unlocked[currentSection] = true;
                    document.getElementById('geet-modal').classList.remove('hidden');
                    goHome();
                } else renderQ();
            } else {
                playSound('audio-wrong');
                document.getElementById('trump-modal').classList.remove('hidden');
            }
        }

        function startChat() {
            hideAll();
            document.getElementById('content-messages').classList.remove('hidden');
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = '';
            const msgs = [
                { s: "Morgana", m: "Joker! The target is wide open." },
                { s: "Ryuji", m: "For real?! Let's go!" },
                { s: "Ann", m: "Ready when you are!" }
            ];
            msgs.forEach((msg, i) => {
                setTimeout(() => {
                    flow.innerHTML += `<div class="msg-bubble msg-left"><span class="msg-sender">${msg.s}</span>${msg.m}</div>`;
                    flow.scrollTop = flow.scrollHeight;
                }, i * 700);
            });
        }

        function showGallery(s) {
            hideAll();
            const gall = document.getElementById('content-gallery');
            const items = document.getElementById('gallery-items');
            const title = document.getElementById('gallery-title');
            gall.classList.remove('hidden');
            items.innerHTML = '';
            
            if(s === 'videos') {
                title.innerText = "RESTORED MEMORIES (PHOTOS)";
                items.innerHTML = `
                    <div class="media-box"><img src="photo1.jpg" onerror="this.src='https://via.placeholder.com/400x300?text=Photo1.jpg'"></div>
                    <div class="media-box"><img src="photo2.jpg" onerror="this.src='https://via.placeholder.com/400x300?text=Photo2.jpg'"></div>
                `;
            } else {
                title.innerText = "GALLERY OF THIEVES (VIDEOS)";
                items.innerHTML = `
                    <div class="media-box"><video controls><source src="video1.mp4" type="video/mp4"></video></div>
                    <div class="media-box"><video controls><source src="video2.mp4" type="video/mp4"></video></div>
                `;
            }
        }

        function goHome() {
            hideAll();
            document.getElementById('main-menu').classList.remove('hidden');
            syncUI();
        }

        function hideAll() {
            ['main-menu', 'quiz-container', 'content-messages', 'content-gallery'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('hidden');
            });
        }

        function syncUI() {
            if(unlocked.messages) { document.getElementById('btn-messages').classList.add('unlocked'); document.getElementById('reveal-1').classList.remove('hidden'); }
            if(unlocked.videos) { document.getElementById('btn-videos').classList.add('unlocked'); document.getElementById('reveal-2').classList.remove('hidden'); }
            if(unlocked.drawings) { document.getElementById('btn-drawings').classList.add('unlocked'); document.getElementById('reveal-3').classList.remove('hidden'); }
        }

        function checkMasterCode() {
            if(document.getElementById('master-code-input').value === "11037") {
                playSound('audio-code-ok');
                unlocked = { messages: true, videos: true, drawings: true };
                goHome();
            } else { playSound('audio-code-fail'); }
        }

        function closeTrump() { document.getElementById('trump-modal').classList.add('hidden'); }

        // --- INIT ---
        window.onload = () => {
            startBGM();

            // Physics Effects
            const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
            const engine = Engine.create();
            const canvas = document.getElementById('chibi-canvas');
            const render = Render.create({
                canvas: canvas, engine: engine,
                options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
            });
            const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight+50, window.innerWidth, 100, { isStatic: true });
            Composite.add(engine.world, ground);
            const spawn = () => {
                const c = Bodies.circle(Math.random()*window.innerWidth, -50, 20, {
                    restitution: 0.5,
                    render: { sprite: { texture: 'chibi.png', xScale: 0.12, yScale: 0.12 } }
                });
                Composite.add(engine.world, c);
            };
            for(let i=0; i<7; i++) spawn();
            Events.on(engine, 'afterUpdate', () => {
                engine.world.bodies.forEach(b => {
                    if(b.position.y > window.innerHeight + 50) {
                        Matter.Body.setPosition(b, { x: Math.random()*window.innerWidth, y: -50 });
                        Matter.Body.setVelocity(b, { x: 0, y: 0 });
                    }
                });
            });
            Render.run(render);
            Runner.run(Runner.create(), engine);
        };
    </script>
</body>
</html>
